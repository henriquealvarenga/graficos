execute:
  freeze: auto
  warning: false
  message: false

bibliography: references/references.bib
csl: references/csl_styles/ABNT.csl

format:
  html:
    theme:
      light: [cosmo, custom.scss]
    toc: true
    toc-depth: 3
    toc-title: "Nesta página"
    code-fold: true
    code-tools: true
    code-summary: "Ver código R"
    code-overflow: wrap
    code-line-numbers: true
    lang: pt
    lightbox: true
    smooth-scroll: true
    highlight-style: github
    fig-align: center
    fig-responsive: true

lang: pt

knitr:
  opts_chunk:
    fig.width: 8
    fig.height: 5
    fig.retina: 2
    dpi: 150
    out.width: "100%"
